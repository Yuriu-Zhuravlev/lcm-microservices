apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: lms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: wait-for-postgres-and-redis
          image: busybox:1.36
          command: ['sh', '-c',
                    'until nc -z postgres-db 5432 && nc -z redis 6379; do echo waiting...; sleep 3; done']
        - name: wait-for-eureka
          image: busybox:1.36
          command: [ 'sh', '-c',
                     'until nc -z eureka-server 8761; do echo waiting for eureka...; sleep 3; done' ]
      containers:
        - name: auth-service
          image: ghcr.io/yuriu-zhuravlev/lcm-microservices/auth-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 15