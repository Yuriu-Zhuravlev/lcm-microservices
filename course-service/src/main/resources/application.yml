server:
  port: 8082
  forward-headers-strategy: framework

spring:
  application:
    name: course-service

  datasource:
    url: jdbc:postgresql://localhost:5433/lms_db?currentSchema=courses_schema&options=-c timezone=UTC
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: courses_schema
        format_sql: true
    show-sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true

  flyway:
    enabled: true
    schemas: courses_schema
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
    cache:
      type: redis
      redis:
        cache-null-values: false
        time-to-live: 3600000


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000

springdoc:
  api-docs:
    enabled: true
    path: /api/courses/v3/api-docs
  swagger-ui:
    enabled: true
    path: /api/courses/swagger-ui.html