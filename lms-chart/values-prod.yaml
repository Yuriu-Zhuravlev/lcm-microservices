# ── Global ──────────────────────────────────────
global:
  imageRegistry: "ghcr.io/yuriu-zhuravlev/lcm-microservices"
  imageTag: "latest"
  imagePullPolicy: Always
  redis:
    host: "lms-redis.ggel71.0001.euc1.cache.amazonaws.com"
    port: "6379"
  postgres:
    host: "lms-postgres.cde0206gqz15.eu-central-1.rds.amazonaws.com"

# ── External Secrets Operator ──────────────────
eso:
  enabled: true
  iamRoleArn: "arn:aws:iam::479585724485:role/eksctl-lms-cluster-addon-iamserviceaccount-lm-Role1-TYpjBW22Frmn"

# ── Eureka ─────────────────────────────────────────
eurekaUrl: "http://eureka-server:8761/eureka/"
eureka:
  resources:
    requests:
      memory: "256Mi"
      cpu: "50m"
    limits:
      memory: "384Mi"
      cpu: "500m"

# ── Auth Service ───────────────────────────────────
authService:
  replicas: 1
  image: "auth-service"
  port: 8081
  datasourceUrl: "jdbc:postgresql://lms-postgres.cde0206gqz15.eu-central-1.rds.amazonaws.com:5432/lms?currentSchema=auth_schema&options=-c%20timezone=UTC"
  resources:
    requests:
      memory: "384Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "1000m"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ── Course Service ─────────────────────────────────
courseService:
  replicas: 1
  image: "course-service"
  port: 8082
  datasourceUrl: "jdbc:postgresql://lms-postgres.cde0206gqz15.eu-central-1.rds.amazonaws.com:5432/lms?currentSchema=courses_schema&options=-c%20timezone=UTC"
  resources:
    requests:
      memory: "384Mi"
      cpu: "100m"
    limits:
      memory: "576Mi"
      cpu: "1000m"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ── Learning Service ───────────────────────────────
learningService:
  replicas: 1
  image: "learning-service"
  port: 8083
  datasourceUrl: "jdbc:postgresql://lms-postgres.cde0206gqz15.eu-central-1.rds.amazonaws.com:5432/lms?currentSchema=learning_schema&options=-c%20timezone=UTC"
  resources:
    requests:
      memory: "384Mi"
      cpu: "100m"
    limits:
      memory: "576Mi"
      cpu: "1000m"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ── API Gateway ────────────────────────────────────
apiGateway:
  replicas: 1
  image: "api-gateway"
  port: 8080
  service:
    type: LoadBalancer
  resources:
    requests:
      memory: "192Mi"
      cpu: "50m"
    limits:
      memory: "320Mi"
      cpu: "800m"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ── Postgres ───────────────────────────────────────
postgres:
  enabled: false

# ── RabbitMQ ───────────────────────────────────────
rabbitmq:
  image: "rabbitmq:3-management"
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "384Mi"
      cpu: "600m"

# ── Redis ───────────────────────────────────────
redis:
  enabled: false