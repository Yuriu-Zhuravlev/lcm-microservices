apiVersion: v1
kind: ConfigMap
metadata:
  name: course-service-config
  namespace: {{ include "lms.namespace" . }}
  labels:
    {{- include "lms.labels" . | nindent 4 }}
data:
  SPRING_DATASOURCE_URL: {{ .Values.courseService.datasourceUrl | quote }}
  SPRING_DATA_REDIS_HOST: {{ .Values.global.redis.host | quote }}
  SPRING_DATA_REDIS_PORT: {{ .Values.global.redis.port | quote }}
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: {{ .Values.eurekaUrl | quote }}
  SPRING_RABBITMQ_HOST: "rabbitmq"
{{- if not .Values.eso.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: lms-secrets
  namespace: {{ include "lms.namespace" . }}
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: {{ .Values.postgres.user | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.postgres.password | quote }}
  JWT_SECRET: {{ .Values.jwtSecret | quote }}
  SPRING_RABBITMQ_USERNAME: {{ .Values.rabbitmq.user | quote }}
  SPRING_RABBITMQ_PASSWORD: {{ .Values.rabbitmq.password | quote }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-service
  namespace: {{ include "lms.namespace" . }}
spec:
  {{- if not .Values.courseService.hpa.enabled }}
  replicas: {{ .Values.courseService.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: course-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: course-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8082"
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Values.global.postgres.host }} 5432 && nc -z {{ .Values.global.redis.host }} 6379 && nc -z eureka-server 8761 && nc -z rabbitmq 5672; do sleep 3; done']
      containers:
        - name: course-service
          image: {{ .Values.global.imageRegistry }}/{{ .Values.courseService.image }}:{{ .Values.global.imageTag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.courseService.port }}
          envFrom:
            - configMapRef:
                name: course-service-config
            - secretRef:
                name: lms-secrets
          resources:
            {{- toYaml .Values.courseService.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.courseService.port }}
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.courseService.port }}
            initialDelaySeconds: 120
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: course-service
  namespace: {{ include "lms.namespace" . }}
spec:
  type: ClusterIP
  selector:
    app: course-service
  ports:
    - port: {{ .Values.courseService.port }}
      targetPort: {{ .Values.courseService.port }}