name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
    paths:
      - 'pom.xml'
      - 'common-dto/**'
      - 'auth-service/**'
      - 'course-service/**'
      - 'learning-service/**'
      - 'api-gateway/**'
      - 'eureka-server/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: latest

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      rebuild-all: ${{ steps.changes.outputs.rebuild-all }}
      auth: ${{ steps.changes.outputs.auth }}
      course: ${{ steps.changes.outputs.course }}
      learning: ${{ steps.changes.outputs.learning }}
      gateway: ${{ steps.changes.outputs.gateway }}
      eureka: ${{ steps.changes.outputs.eureka }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            rebuild-all:
              - 'pom.xml'
              - 'common-dto/**'
              - '.github/workflows/**'
            auth:
              - 'auth-service/**'
            course:
              - 'course-service/**'
            learning:
              - 'learning-service/**'
            gateway:
              - 'api-gateway/**'
            eureka:
              - 'eureka-server/**'

  test:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Test all (common-dto or pom changed)
        if: needs.detect-changes.outputs.rebuild-all == 'true'
        run: mvn test -pl common-dto,auth-service,course-service,learning-service,api-gateway -am

      - name: Test auth-service
        if: needs.detect-changes.outputs.rebuild-all != 'true' && needs.detect-changes.outputs.auth == 'true'
        run: mvn test -pl common-dto,auth-service -am

      - name: Test course-service
        if: needs.detect-changes.outputs.rebuild-all != 'true' && needs.detect-changes.outputs.course == 'true'
        run: mvn test -pl common-dto,course-service -am

      - name: Test learning-service
        if: needs.detect-changes.outputs.rebuild-all != 'true' && needs.detect-changes.outputs.learning == 'true'
        run: mvn test -pl common-dto,learning-service -am

      - name: Test api-gateway
        if: needs.detect-changes.outputs.rebuild-all != 'true' && needs.detect-changes.outputs.gateway == 'true'
        run: mvn test -pl common-dto,api-gateway -am

  build-and-push:
    runs-on: ubuntu-latest
    needs: [ detect-changes, test ]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare Repository Name
        run: echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn clean compile -DskipTests

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push eureka-server
        if: needs.detect-changes.outputs.rebuild-all == 'true' || needs.detect-changes.outputs.eureka == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./eureka-server/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/eureka-server:${{ env.IMAGE_TAG }}

      - name: Build and Push api-gateway
        if: needs.detect-changes.outputs.rebuild-all == 'true' || needs.detect-changes.outputs.gateway == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api-gateway/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/api-gateway:${{ env.IMAGE_TAG }}

      - name: Build and Push auth-service
        if: needs.detect-changes.outputs.rebuild-all == 'true' || needs.detect-changes.outputs.auth == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./auth-service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/auth-service:${{ env.IMAGE_TAG }}

      - name: Build and Push course-service
        if: needs.detect-changes.outputs.rebuild-all == 'true' || needs.detect-changes.outputs.course == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./course-service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/course-service:${{ env.IMAGE_TAG }}

      - name: Build and Push learning-service
        if: needs.detect-changes.outputs.rebuild-all == 'true' || needs.detect-changes.outputs.learning == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./learning-service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/learning-service:${{ env.IMAGE_TAG }}