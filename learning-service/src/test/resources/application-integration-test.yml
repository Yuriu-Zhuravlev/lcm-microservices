spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: learning_schema
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    schemas: learning_schema
    create-schemas: true
    locations: classpath:db/migration
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    listener:
      simple:
        retry:
          enabled: false
eureka:
  client:
    enabled: false
