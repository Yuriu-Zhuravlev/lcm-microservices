server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        enabled: true
        # Маршрути описані в GatewayConfig.java — тут не потрібні

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.web: DEBUG
    io.github.resilience4j: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    disable-swagger-default-url: true
    urls:
      - name: Auth Service
        url: /api/auth/v3/api-docs
      - name: Course Service
        url: /api/courses/v3/api-docs
      - name: Learning Service
        url: /api/learning/v3/api-docs
  api-docs:
    path: /v3/api-docs
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,circuitbreakers,circuitbreakerevents"
  health:
    circuitbreakers:
      enabled: true

# ─── Resilience4j ─────────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 80
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      auth-service:
        base-config: default
      course-service:
        base-config: default
      learning-service:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 5s
    instances:
      auth-service:
        base-config: default
      course-service:
        base-config: default
      learning-service:
        base-config: default